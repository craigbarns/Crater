[phases.setup]
nixPkgs = ["php82", "php82Packages.composer"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction",
    "chmod -R 775 storage bootstrap/cache"
]

[phases.build]
cmds = ["echo 'Assets pre-built, skipping npm build'"]

[start]
cmd = "mkdir -p storage/app && touch storage/app/database_created && touch .env && chmod 644 .env && chmod -R 775 storage bootstrap/cache && php artisan migrate --force && php artisan optimize && php -S 0.0.0.0:$PORT -t public"
